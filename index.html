<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Arena Survival</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎮 PANTALLA DE INICIO -->
  <div id="startScreen">
    <div class="panel">
      <h1>🔥 Arena Survival</h1>

      <input id="playerName" type="text" placeholder="Tu nombre">

      <input id="playerAvatar" type="text" placeholder="Avatar (emoji o URL)">

      <button onclick="startGame()">JUGAR</button>
    </div>
  </div>

  <!-- 🎮 Canvas del juego -->
  <canvas id="game"></canvas>

  <!-- 🧠 UI del juego -->
  <div id="ui">
    <p>Score: <span id="score">0</span></p>
    <p>Vida: <span id="hp">100</span></p>
    <p>Best: <span id="best">0</span></p>
  </div>

  <!-- 🔫 Script del juego -->
  <script src="game.js"></script>
</body>
</html>
