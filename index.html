<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Arena Survival</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* 🎮 Leaderboard dentro del juego (TOP 5) */
    #leaderboard {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      min-width: 140px;
      z-index: 10;
    }

    #leaderboard h3 {
      margin: 0 0 6px 0;
      font-size: 14px;
      text-align: center;
      color: gold;
    }

    /* 🏠 Leaderboard del menú */
    .menu-board {
      margin-top: 15px;
      max-height: 220px;
      overflow-y: auto;
      text-align: left;
    }

    .menu-board div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      margin: 4px 0;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);

      transition: 0.2s;
    }

    .menu-board div:hover {
      background: rgba(255,215,0,0.15);
      transform: scale(1.02);
    }

    .menu-board .rank {
      color: gold;
      width: 30px;
      font-weight: bold;
    }

    .menu-board .name {
      flex: 1;
      margin-left: 5px;
    }

    .menu-board .score {
      font-weight: bold;
    }

    /* 👤 Avatar */
    .avatar-img {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin: 0 5px;
      object-fit: cover;
    }

    .avatar-emoji {
      margin: 0 5px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- 🎮 PANTALLA DE INICIO -->
  <div id="startScreen">
    <div class="panel">
      <h1>🔥 Arena Survival</h1>

      <input id="playerName" type="text" placeholder="Tu nombre">
      <input id="playerAvatar" type="text" placeholder="Avatar (emoji o URL)">

      <button onclick="startGame()">JUGAR</button>

      <!-- 🏆 LEADERBOARD EN MENÚ -->
      <div id="menuLeaderboard" class="menu-board">
        <!-- Se llena dinámicamente -->
      </div>
    </div>
  </div>

  <!-- 🎮 Canvas del juego -->
  <canvas id="game"></canvas>

  <!-- 🧠 UI del juego -->
  <div id="ui">
    <p>Score: <span id="score">0</span></p>
    <p>Vida: <span id="hp">100</span></p>
    <p>Best: <span id="best">0</span></p>
  </div>

  <!-- 🏆 LEADERBOARD EN JUEGO -->
  <div id="leaderboard">
    <h3>🏆 Top 5</h3>
  </div>

  <!-- ===================== LIBRERÍAS ===================== -->

  <!-- ⚡ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- 🎮 Juego -->
  <script src="game.js"></script>

</body>
</html>
