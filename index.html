<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Arena Survival</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* 🏆 Leaderboard estilo simple pero visible */
    #leaderboard {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      min-width: 150px;
    }

    #leaderboard h3 {
      margin: 0 0 5px 0;
      font-size: 16px;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- 🎮 PANTALLA DE INICIO -->
  <div id="startScreen">
    <div class="panel">
      <h1>🔥 Arena Survival</h1>

      <input id="playerName" type="text" placeholder="Tu nombre">

      <input id="playerAvatar" type="text" placeholder="Avatar (emoji o URL)">

      <button onclick="startGame()">JUGAR</button>
    </div>
  </div>

  <!-- 🎮 Canvas del juego -->
  <canvas id="game"></canvas>

  <!-- 🧠 UI del juego -->
  <div id="ui">
    <p>Score: <span id="score">0</span></p>
    <p>Vida: <span id="hp">100</span></p>
    <p>Best: <span id="best">0</span></p>
  </div>

  <!-- 🏆 LEADERBOARD GLOBAL -->
  <div id="leaderboard">
    <h3>🏆 Top 10</h3>
    <!-- Aquí se llenará dinámicamente -->
  </div>

  <!-- ===================== LIBRERÍAS ===================== -->

  <!-- ⚡ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- 🎮 Juego -->
  <script src="game.js"></script>

</body>
</html>
